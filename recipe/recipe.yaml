schema_version: 1

context:
  name: pybrowsers
  version: "1.4.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pybrowsers-${{ version }}.tar.gz
  sha256: 9a23d000f5a1669e309ab584cce67ca6021280d6bf5f6e489331349db3ef9961

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - uv-build >=0.10.11,<0.12.0
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - pywin32 >=303,<311
    - pyxdg >=0.27,<0.29

tests:
  - python:
      imports:
        - browsers
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python library for detecting and launching browsers
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/roniemartinez/browsers

extra:
  recipe-maintainers:
    - thewchan
